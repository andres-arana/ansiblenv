---
- name: Install fzf
  apt:
    name: fzf
    state: latest
  become: yes

- name: Install bat for displaying preview window
  apt:
    name: bat
    state: latest
  become: yes

- name: Install the fzf initializer
  copy:
    src: files/fzf.bash
    dest: ~/.bash.d/fzf.bash
    force: yes

- name: Install fzf-git keybindings
  copy:
    src: files/fzf-git.sh
    dest: ~/.bash.d/fzf-git.bash
    force: yes

