---
- name: Install vim
  ansible.builtin.apt:
    name: vim-gtk3
    state: latest
  become: true

- name: Install software dependencies for what we use with vim
  ansible.builtin.apt:
    name:
      - silversearcher-ag
      - build-essential
      - cmake
      - universal-ctags
      - ripgrep
    state: latest
  become: true

- name: Create .vim directory
  ansible.builtin.file:
    path: ~/.vim
    state: directory
    mode: '0755'

- name: Create autoload directory
  ansible.builtin.file:
    path: ~/.vim/autoload/
    state: directory
    mode: '0755'

- name: Setup .vimrc
  ansible.builtin.copy:
    src: files/vimrc
    dest: ~/.vimrc
    mode: '0644'

- name: Setup coc configuration file
  ansible.builtin.copy:
    src: files/coc-settings.json
    dest: ~/.vim/coc-settings.json
    mode: '0644'

- name: Setup vim plug
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: ~/.vim/autoload/plug.vim
    mode: '0644'

- name: Copy snippets
  ansible.builtin.copy:
    src: files/ultisnips/
    dest: ~/.vim/
    mode: '0644'
    directory_mode: '0755'

- name: Install node dependencies
  community.general.npm:
    global: true
    name: "{{ item }}"
  become: true
  loop:
    - eslint
    - typescript

- name: Install python dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-autopep8
    state: latest
  become: true
