---
- name: Install tmux and xclip for clipboard management
  ansible.builtin.apt:
    name:
      - tmux
      - xclip
    state: latest
  become: true

- name: Setup .tmux.conf
  ansible.builtin.copy:
    src: files/tmux.conf
    dest: ~/.tmux.conf
    mode: '0644'

- name: Ensure tmux scripts directory exists
  ansible.builtin.file:
    path: ~/.tmux/scripts
    state: directory
    mode: '0755'

- name: Install tmux helper scripts
  ansible.builtin.copy:
    src: files/tmux-pane-selector.sh
    dest: ~/.tmux/scripts/tmux-pane-selector.sh
    mode: '0755'

- name: Install TPM
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: ~/.tmux/plugins/tpm
    version: master
