# Fix tmux color behavior
set -ag terminal-features ",*:RGB"

# Enable undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Enable undercurl colors (requires tmux 3.1+)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Enable triggering focus events
set -g focus-events on

# Set C-a as the prefix
set -g prefix C-a
bind C-a send-prefix

# Use a really long history limit
set -g history-limit 999999

# Set window and pane index to 1
set -g base-index 1
setw -g pane-base-index 1

# Enable automatic renumbering
set -g renumber-windows on

# Set the escape time to zero
set -s escape-time 0

# Set vi mode keys
setw -g mode-keys vi

# Enable mouse capture
set -g mouse

# Automatically rename windows to current directory basename
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g set-titles on

# Set external tool to handle copy and paste
set -s copy-command 'xclip -sel clipboard'

# Settings required to interact with some TUIs
set -g allow-passthrough on
set -s extended-keys on

# Set C-r to reload the tmux configuration
bind r source-file ~/.tmux.conf

# Setup quick pane navigation
bind q display-panes -d 0

# Rebind split and create windows to use the current pane, and with better
# mnemonics
bind | split-window -h -c '#{pane_current_path}'
bind _ split-window -v -c '#{pane_current_path}' -l 30%
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Utilities and shortcuts
bind T new-window -c ~/Dropbox/Wiki/ nvim index.md
bind t display-popup -d ~/Dropbox/Wiki -w80% -h80% -E "nvim index.md"
bind d command-prompt -p "claude profile (gfw/obs):" "split-window -h -c '#{pane_current_path}' -l 40% 'CLAUDE_CONFIG_DIR=~/.config/claude/%1 claude'"
bind s display-popup -d '#{pane_current_path}' -w80% -h80% -E

# fzf pane selector with bell status: lists all panes server-wide, previews
# contents, marks windows with a pending bell, jumps to the selection.
bind f display-popup -w80% -h80% -E "~/.tmux/scripts/tmux-pane-selector.sh"

# Statusbar on top
set -g status-position top

# Use escape to enter copy mode
bind Escape copy-mode

# Plugins
set -g @plugin 'tmux-plugins/tpm'

# Colorscheme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'

# Global bell indicator (Claude notify/stop hooks ring a bell in their window).
# Loops windows and lists each one with a pending bell as "🔔 W#N". Lives in the
# gruvbox right-status-x slot so it's theme-agnostic — no per-window format hacks.
# Must be set before tpm runs: the theme bakes slot values into status-right at
# load, then tmux expands the #{W:...}/#{?...} live on every redraw.
# x: per-window bell list, or "No notifications" when none have a pending bell.
# Outer #{?...} tests whether the loop matches any window; the W: loop runs twice
# (once as the test, once to render) — cheap, avoids needing a format variable.
set -g @tmux-gruvbox-right-status-x "#{?#{W:#{?window_bell_flag,B,}},#{W:#{?window_bell_flag,[🔔 W###{window_index}] ,}},No notifications}"
# y: date-time + zone city name. %Z is just "-03" here (tzdata has no abbrev for
# America/Argentina/Buenos_Aires), so derive the city from /etc/localtime instead.
set -g @tmux-gruvbox-right-status-y "%Y-%m-%d %H:%M #(readlink -f /etc/localtime | xargs basename | tr _ ' ')"
# z: 1-minute load average.
set -g @tmux-gruvbox-right-status-z "Load: #(cut -d' ' -f1 /proc/loadavg)"

# Flag the window on bell (monitor-bell, default on) but stay silent: no audible
# beep and no "Bell in window" message. window_bell_flag still sets, so the
# indicator above still works.
set -g bell-action none

# Quick copying tools
set -g @plugin 'Morantron/tmux-fingers'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
